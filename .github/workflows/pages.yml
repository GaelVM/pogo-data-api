name: Deploy static API to GitHub Pages

on:
  push:
    branches: [main]
  schedule:
    - cron: '17 */12 * * *'
  workflow_dispatch:
    inputs:
      refresh_data:
        description: 'Descargar un Game Master nuevo antes de publicar'
        type: boolean
        default: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Download current dataset
        if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.refresh_data)
        run: npm run data:generate
      - name: Import DataDuck live data
        run: npm run data:dataduck
      - run: npm run static:build
      - run: npm test
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v4
        with:
          path: public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
