services:
  database:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: pogo
      POSTGRES_PASSWORD: pogo_dev_password
      POSTGRES_DB: pogo_data
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pogo -d pogo_data"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"

  api:
    build: .
    restart: unless-stopped
    depends_on:
      database:
        condition: service_healthy
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000
      DATABASE_URL: postgresql://pogo:pogo_dev_password@database:5432/pogo_data?schema=public
      CORS_ORIGIN: "*"
      RATE_LIMIT_MAX: 100
    ports:
      - "3000:3000"

volumes:
  postgres_data:
